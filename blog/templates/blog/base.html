{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block seo %}
    {% include "blog/includes/seo_meta.html" %}
    {% endblock %}

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWE8JV60X8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FWE8JV60X8');
    </script>

    <!-- FetchBot Pixel - Visitor Tracking -->
    <script src="https://fetchbot.ai/pixel/growthpilot.min.js" data-key="b45d0e02-f375-4a2e-8729-dc87f0905202"></script>

    <!-- Fonts - Editorial Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================
           OUTFI EDITORIAL BLOG - MAGAZINE STYLE
           Inspired by high-end fashion publications
           ============================================ */

        :root {
            /* Editorial Color Palette */
            --bg-cream: #FFFFFF;
            --bg-white: #FFFFFF;
            --text-black: #1A1A1A;
            --text-gray: #666666;
            --text-light: #999999;
            --accent-pink: #E91E63;
            --border-light: #E5E5E5;

            /* Typography */
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

            /* Spacing */
            --content-width: 720px;
            --wide-width: 960px;
            --full-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-cream);
            color: var(--text-black);
            line-height: 1.7;
            font-size: 16px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================
           HEADER - Matches Main App
           ============================================ */

        .site-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #f0f0f0;
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 80px;
            width: auto;
        }

        .header-nav-links {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header-nav-links a {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            color: #555;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0;
            text-transform: none;
        }

        .header-nav-links a:hover,
        .header-nav-links a.active {
            color: #111;
        }

        .header-actions {
            display: flex;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            background: #111;
            color: #fff;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: #333;
            transform: translateY(-1px);
        }

        /* ============================================
           MAIN CONTENT AREA
           ============================================ */

        .main-content {
            max-width: var(--full-width);
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 200px);
        }

        /* ============================================
           ARTICLE TYPOGRAPHY - Editorial Style
           ============================================ */

        .article-header {
            max-width: var(--content-width);
            margin: 0 auto 3rem;
        }

        .article-category {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            display: block;
        }

        .article-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .article-meta {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        .article-meta .author {
            color: var(--text-black);
            font-weight: 500;
        }

        /* Featured Image - Full Width */
        .featured-image {
            width: 100%;
            max-width: var(--wide-width);
            margin: 3rem auto;
        }

        .featured-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-caption {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-top: 1rem;
        }

        /* Article Body */
        .article-body {
            max-width: var(--content-width);
            margin: 0 auto;
        }

        .article-body p {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.9;
            color: var(--text-black);
            margin-bottom: 1.75rem;
        }

        .article-body p:first-of-type::first-letter {
            font-family: var(--font-serif);
            font-size: 4rem;
            float: left;
            line-height: 1;
            padding-right: 0.75rem;
            padding-top: 0.25rem;
            font-weight: 400;
        }

        .article-body h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 500;
            margin: 3rem 0 1.5rem;
            letter-spacing: 0.02em;
        }

        .article-body h3 {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 600;
            font-style: italic;
            margin: 2rem 0 1rem;
        }

        .article-body blockquote {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.6;
            border-left: 2px solid var(--text-black);
            padding-left: 2rem;
            margin: 3rem 0;
            color: var(--text-gray);
        }

        .article-body a {
            color: var(--text-black);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .article-body a:hover {
            color: var(--accent-pink);
        }

        /* Inline Images */
        .article-body figure {
            margin: 3rem 0;
        }

        .article-body figure img {
            width: 100%;
            height: auto;
        }

        .article-body figcaption {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-top: 0.75rem;
        }

        /* Image with Text Wrap */
        .image-left {
            float: left;
            width: 45%;
            margin: 0.5rem 2rem 1rem 0;
        }

        .image-right {
            float: right;
            width: 45%;
            margin: 0.5rem 0 1rem 2rem;
        }

        /* Product Grid within Article */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 2rem 0;
            clear: both;
        }

        .product-grid img {
            width: 100%;
            height: auto;
        }

        /* Editorial Disclosure */
        .editorial-note {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--text-light);
            text-transform: uppercase;
            margin: 2rem 0;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        /* ============================================
           SIDEBAR - Editorial Label
           ============================================ */

        .editorial-sidebar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: right center;
            font-family: var(--font-sans);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* ============================================
           TAGS
           ============================================ */

        .article-tags {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin: 3rem 0;
            padding-top: 2rem;
            border-top: 1px solid var(--border-light);
        }

        .tag {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-light);
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .tag:hover {
            color: var(--text-black);
            border-color: var(--text-black);
        }

        /* ============================================
           MODULAR CARD SECTIONS - 10 Unique Variations
           ============================================ */

        /* --- Color Palette --- */
        .blog-card--sage {
            background: #D4E8C4;
        }

        .blog-card--sky {
            background: #C8E6F0;
        }

        .blog-card--peach {
            background: #F5D5B5;
        }

        .blog-card--lavender {
            background: #DDD5F3;
        }

        .blog-card--rose {
            background: #F5D0D5;
        }

        .blog-card--mint {
            background: #C2E8DC;
        }

        .blog-card--sand {
            background: #E8DCC8;
        }

        .blog-card--ice {
            background: #D0E0F0;
        }

        .blog-card--coral {
            background: #F5C4B8;
        }

        .blog-card--lemon {
            background: #F0ECC0;
        }

        /* ═══════════════════════════════════════════
           1. LIST CARD — Key Takeaways / Tips
           White inner card with bullet list
           ═══════════════════════════════════════════ */

        .blog-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .blog-card-inner {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 2rem 2.25rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        .blog-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .blog-card-title {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-black);
        }

        .blog-card-badge {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            color: var(--text-gray);
        }

        .blog-card-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .blog-card-list li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #f5f5f5;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-black);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .blog-card-list li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .blog-card-list li::before {
            content: '';
            flex-shrink: 0;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-light);
            margin-top: 0.55rem;
        }

        .blog-card-list li strong {
            font-weight: 600;
        }

        .blog-card-caption {
            text-align: center;
            margin-top: 1.5rem;
            font-family: var(--font-sans);
        }

        .blog-card-caption h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-black);
            margin-bottom: 0.4rem;
            font-style: normal;
        }

        .blog-card-caption p {
            font-size: 0.85rem;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* ═══════════════════════════════════════════
           2. STAT CARD — Big numbers / data callout
           ═══════════════════════════════════════════ */

        .stat-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .stat-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            flex: 1;
            min-width: 140px;
            text-align: center;
            padding: 1rem 0;
        }

        .stat-number {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-black);
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-gray);
            line-height: 1.4;
        }

        .stat-card-caption {
            text-align: center;
            margin-top: 1.5rem;
            font-family: var(--font-sans);
        }

        .stat-card-caption h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-black);
            margin-bottom: 0.3rem;
            font-style: normal;
        }

        .stat-card-caption p {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0;
        }

        /* ═══════════════════════════════════════════
           3. COMPARISON CARD — Side by side (Do / Don't)
           ═══════════════════════════════════════════ */

        .compare-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .compare-card-inner {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .compare-card-header {
            padding: 1.5rem 2rem 1rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-black);
            border-bottom: 1px solid #f0f0f0;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .compare-col {
            padding: 1.5rem 2rem;
        }

        .compare-col:first-child {
            border-right: 1px solid #f0f0f0;
        }

        .compare-col-title {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .compare-col-title.do {
            color: #10b981;
        }

        .compare-col-title.dont {
            color: #ef4444;
        }

        .compare-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .compare-col li {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 0.5rem 0;
            color: var(--text-black);
        }

        @media (max-width: 600px) {
            .compare-grid {
                grid-template-columns: 1fr;
            }

            .compare-col:first-child {
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
            }
        }

        /* ═══════════════════════════════════════════
           4. QUOTE CARD — Editorial pull quote
           ═══════════════════════════════════════════ */

        .quote-card {
            border-radius: 20px;
            padding: 3rem 2.5rem;
            margin: 2.5rem 0;
            text-align: center;
        }

        .quote-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        .quote-card-mark {
            font-family: var(--font-serif);
            font-size: 4rem;
            line-height: 1;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .quote-card-text {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.6;
            color: var(--text-black);
            margin-bottom: 1.25rem;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        .quote-card-attr {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* ═══════════════════════════════════════════
           5. STEPS CARD — Numbered process
           ═══════════════════════════════════════════ */

        .steps-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .steps-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 2rem 2.25rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        .steps-card-header {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #f8f8f8;
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-num {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-gray);
        }

        .step-content h4 {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text-black);
        }

        .step-content p {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--text-gray);
            line-height: 1.5;
            margin: 0;
        }

        /* ═══════════════════════════════════════════
           6. MINI GRID CARD — Quick guide / 2x2 or 3-col
           ═══════════════════════════════════════════ */

        .grid-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .grid-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        .grid-card-header {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .grid-items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
        }

        .grid-item {
            background: #fafafa;
            border-radius: 12px;
            padding: 1.25rem;
        }

        .grid-item-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .grid-item h4 {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-black);
            margin-bottom: 0.35rem;
        }

        .grid-item p {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-gray);
            line-height: 1.5;
            margin: 0;
        }

        @media (max-width: 480px) {
            .grid-items {
                grid-template-columns: 1fr;
            }
        }

        /* ═══════════════════════════════════════════
           7. TIP CALLOUT — Small editorial aside
           ═══════════════════════════════════════════ */

        .tip-card {
            border-radius: 16px;
            margin: 2rem 0;
            padding: 1.75rem 2rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .tip-card-icon {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .tip-card-content h4 {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-black);
            margin-bottom: 0.35rem;
        }

        .tip-card-content p {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--text-gray);
            line-height: 1.6;
            margin: 0;
        }

        /* ═══════════════════════════════════════════
           8. CHECKLIST CARD — Checkmark items
           ═══════════════════════════════════════════ */

        .check-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .check-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 2rem 2.25rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        }

        .check-card-header {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .check-item:last-child {
            border-bottom: none;
        }

        .check-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: #10b981;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        .check-text {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-black);
        }

        .check-text strong {
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════
           9. DID-YOU-KNOW — Accent highlight bar
           ═══════════════════════════════════════════ */

        .dyk-card {
            background: #fff;
            border-left: 4px solid #6366f1;
            border-radius: 0 16px 16px 0;
            padding: 1.75rem 2rem;
            margin: 2.5rem 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .dyk-label {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6366f1;
            margin-bottom: 0.5rem;
        }

        .dyk-text {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.7;
            color: var(--text-black);
        }

        .dyk-text strong {
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════
           10. TWO-COL INFO CARD — Side text + side list
           ═══════════════════════════════════════════ */

        .info-card {
            border-radius: 20px;
            padding: 2.5rem;
            margin: 2.5rem 0;
        }

        .info-card-inner {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        .info-card-text h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-black);
            margin-bottom: 0.75rem;
            font-style: normal;
        }

        .info-card-text p {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-gray);
            margin: 0;
        }

        .info-card-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-card-items li {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 0.6rem 0;
            border-bottom: 1px solid #f3f3f3;
            color: var(--text-black);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-card-items li:last-child {
            border-bottom: none;
        }

        .info-card-items li::before {
            content: '→';
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .info-card-inner {
                grid-template-columns: 1fr;
            }
        }

        /* ============================================
           RELATED ARTICLES
           ============================================ */

        .related-section {
            max-width: var(--wide-width);
            margin: 5rem auto 0;
            padding-top: 3rem;
            border-top: 1px solid var(--border-light);
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .related-card {
            text-decoration: none;
            color: inherit;
        }

        .related-card img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            margin-bottom: 1rem;
            filter: grayscale(0);
            transition: filter 0.3s;
        }

        .related-card:hover img {
            filter: grayscale(100%);
        }

        .related-card h3 {
            font-family: var(--font-serif);
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .related-card .date {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* ============================================
           FOOTER
           ============================================ */

        .site-footer {
            background: var(--bg-white);
            border-top: 1px solid var(--border-light);
            padding: 3rem 2rem;
            margin-top: 5rem;
        }

        .footer-inner {
            max-width: var(--full-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-black);
        }

        .footer-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .footer-links a {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-gray);
        }

        .footer-links a:hover {
            color: var(--text-black);
        }

        .copyright {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        /* ============================================
           BLOG INDEX PAGE
           ============================================ */

        .blog-header {
            text-align: center;
            max-width: var(--content-width);
            margin: 0 auto 4rem;
        }

        .blog-title {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .blog-subtitle {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--text-gray);
            line-height: 1.8;
        }

        /* Featured Article */
        .featured-article {
            max-width: var(--wide-width);
            margin: 0 auto 5rem;
        }

        .featured-article a {
            text-decoration: none;
            color: inherit;
        }

        .featured-article img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            margin-bottom: 2rem;
        }

        .featured-article .category {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-pink);
            margin-bottom: 1rem;
            display: block;
        }

        .featured-article h2 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 1rem;
            max-width: 80%;
        }

        .featured-article .excerpt {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-gray);
            max-width: 70%;
            margin-bottom: 1.5rem;
        }

        .featured-article .meta {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* Article Grid */
        .articles-grid {
            max-width: var(--full-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
        }

        .article-card {
            text-decoration: none;
            color: inherit;
        }

        .article-card img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            margin-bottom: 1.25rem;
            transition: opacity 0.3s;
        }

        .article-card:hover img {
            opacity: 0.85;
        }

        .article-card .category {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-pink);
            margin-bottom: 0.75rem;
            display: block;
        }

        .article-card h3 {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 0.75rem;
        }

        .article-card .excerpt {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.7;
            color: var(--text-gray);
            margin-bottom: 1rem;
        }

        .article-card .meta {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */

        @media (max-width: 1024px) {
            .articles-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .editorial-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }

            .blog-title {
                font-size: 2.5rem;
            }

            .featured-article h2 {
                font-size: 1.75rem;
                max-width: 100%;
            }

            .featured-article .excerpt {
                max-width: 100%;
            }

            .articles-grid,
            .related-grid {
                grid-template-columns: 1fr;
            }

            .header-nav-links {
                display: none;
            }

            .header-actions {
                display: none;
            }

            .image-left,
            .image-right {
                float: none;
                width: 100%;
                margin: 2rem 0;
            }

            .footer-inner {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* ============================================
           SEARCH PAGE
           ============================================ */

        .search-header {
            max-width: var(--content-width);
            margin: 0 auto 3rem;
            text-align: center;
        }

        .search-form {
            display: flex;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-form input {
            flex: 1;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border-light);
            background: var(--bg-white);
            outline: none;
        }

        .search-form input:focus {
            border-color: var(--text-black);
        }

        .search-form button {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 1rem 1.5rem;
            background: var(--text-black);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-form button:hover {
            background: var(--accent-pink);
        }

        /* ============================================
           CATEGORY/TAG PAGES
           ============================================ */

        .category-header {
            text-align: center;
            max-width: var(--content-width);
            margin: 0 auto 4rem;
        }

        .category-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .category-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .category-description {
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-gray);
            margin-top: 1rem;
            line-height: 1.8;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 4rem;
        }

        .pagination a,
        .pagination span {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--text-gray);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .pagination a:hover {
            color: var(--text-black);
            border-color: var(--text-black);
        }

        .pagination .current {
            background: var(--text-black);
            color: white;
            border-color: var(--text-black);
        }

        /* ============================================
           CONTENT SECTIONS - BRAND SHOWCASES
           ============================================ */

        .content-section {
            max-width: var(--wide-width);
            margin: 4rem auto;
            padding: 3rem 0;
            border-top: 1px solid var(--border-light);
        }

        .content-section .section-title {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .content-section .section-subtitle {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 2rem;
            max-width: var(--content-width);
        }

        .content-section .section-content {
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.9;
            margin-bottom: 2rem;
            max-width: var(--content-width);
        }

        /* Product Grid - Editorial Style */
        .content-section .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .product-card {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .product-card .product-image {
            background: var(--bg-white);
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .product-card .product-image img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-card .product-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .product-card .product-price {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-card .original-price {
            text-decoration: line-through;
            color: var(--text-light);
            font-weight: 400;
        }

        .product-card .sale-price {
            color: var(--accent-pink);
            font-weight: 600;
        }

        .product-card .product-brand {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-gray);
        }

        .product-card .product-name {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-light);
            line-height: 1.4;
        }

        .product-card .product-retailer {
            font-family: var(--font-sans);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        /* Responsive Product Grid */
        @media (max-width: 1024px) {
            .content-section .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .content-section .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .product-card .product-image {
                aspect-ratio: 1/1;
            }
        }
    </style>
</head>

<body>
    <!-- Header - Matches Main App -->
    <header class="site-header">
        <div class="header-inner">
            <a href="https://outfi.ai" class="nav-logo">
                <img src="https://outfi.ai/assets/outfi-logo-CAvIhvL2.png" alt="outfi." class="logo-img" />
            </a>
            <div class="header-nav-links">
                <a href="https://outfi.ai/explore">Explore</a>
                <a href="https://outfi.ai/home">Home</a>
                <a href="/blog/" class="active">Blog</a>
            </div>
            <div class="header-actions">
                <a href="https://outfi.ai/login" class="nav-btn">Sign In</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer - Matches Main App -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <a href="https://outfi.ai" class="nav-logo">
                    <img src="https://outfi.ai/assets/outfi-logo-CAvIhvL2.png" alt="outfi."
                        style="height: 50px; width: auto;" />
                </a>
            </div>
            <ul class="footer-links">
                <li><a href="https://outfi.ai/explore">Explore</a></li>
                <li><a href="https://outfi.ai/home">Home</a></li>
                <li><a href="/blog/">Blog</a></li>
                <li><a href="https://outfi.ai/about">About</a></li>
            </ul>
            <div class="copyright">&copy; {% now "Y" %} Outfi. All rights reserved.</div>
        </div>
    </footer>
</body>

</html>
