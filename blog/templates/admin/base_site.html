{% extends 'admin/base.html' %}

{% block extrahead %}
{{ block.super }}
<style>
/* =============================================================
   OUTFI ADMIN — CRITICAL LAYOUT FIX
   Injected via template override (no collectstatic needed).
   AdminLTE 3 / Jazzmin layout:
     .main-sidebar  = fixed left column, 260px
     .content-wrapper = everything to the right
     .main-header   = top navbar, same right offset
   ============================================================= */

/* ── Sidebar: fixed 260px, never wider ── */
.main-sidebar {
    width: 260px !important;
    min-width: 260px !important;
    max-width: 260px !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    height: 100vh !important;
    overflow-x: hidden !important;
    overflow-y: auto !important;
    z-index: 1038 !important;
}

/* ── Content: always starts after the sidebar ── */
.content-wrapper {
    margin-left: 260px !important;
}

/* ── Top navbar: same offset so it doesn't sit behind sidebar ── */
.main-header.navbar,
.main-header {
    margin-left: 260px !important;
    left: 0 !important;
}

/* ── Footer: same offset ── */
.main-footer {
    margin-left: 260px !important;
}

/* ── Sidebar collapse (toggle button shrinks it to icon rail) ── */
body.sidebar-collapse .main-sidebar {
    width: 4.6rem !important;
    min-width: 4.6rem !important;
    max-width: 4.6rem !important;
}
body.sidebar-collapse .content-wrapper,
body.sidebar-collapse .main-footer,
body.sidebar-collapse .main-header.navbar {
    margin-left: 4.6rem !important;
}

/* ── Mobile: sidebar overlays, content starts at 0 ── */
@media (max-width: 991.98px) {
    .main-sidebar {
        transform: translateX(-260px);
        transition: transform 0.3s ease;
        z-index: 1050 !important;
    }
    body.sidebar-open .main-sidebar {
        transform: translateX(0);
    }
    .content-wrapper,
    .main-footer,
    .main-header.navbar {
        margin-left: 0 !important;
    }
}

/* ── Fix sidebar nav section headers being clipped ──
   AdminLTE .nav-header gets extra left indent; reset it. ── */
.main-sidebar .nav-sidebar .nav-header {
    padding: 8px 16px 4px 16px !important;
    overflow: visible !important;
    text-overflow: clip !important;
    white-space: nowrap !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 1.2px !important;
    color: #6b7280 !important;
}

/* ── Nav items: proper flex, no clipping ── */
.main-sidebar .nav-sidebar .nav-item {
    overflow: visible !important;
}

.main-sidebar .nav-sidebar .nav-link {
    display: flex !important;
    align-items: center !important;
    padding: 8px 12px !important;
    margin: 1px 6px !important;
    border-radius: 8px !important;
    overflow: visible !important;
    white-space: nowrap !important;
}

.main-sidebar .nav-sidebar .nav-link p {
    display: inline !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    color: inherit !important;
    margin: 0 !important;
    overflow: visible !important;
    white-space: nowrap !important;
}

.main-sidebar .nav-sidebar .nav-link .nav-icon {
    margin-right: 8px !important;
    font-size: 14px !important;
    width: 20px !important;
    text-align: center !important;
    flex-shrink: 0 !important;
}

/* ── Treeview arrow ── */
.main-sidebar .nav-sidebar .nav-treeview {
    padding-left: 8px !important;
}

/* ── Remove the broken label override that was clipping nav text.
   Keep labels styled only inside forms, not inside nav. ── */
.main-sidebar label,
.navbar label,
.sidebar label {
    display: inline !important;
    font-weight: inherit !important;
    color: inherit !important;
    font-size: inherit !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    margin-bottom: 0 !important;
}

/* =============================================================
   BRAND / LOGO AREA
   ============================================================= */
.main-sidebar .brand-link {
    padding: 14px 16px !important;
    border-bottom: 1px solid rgba(255,255,255,0.1) !important;
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    overflow: hidden !important;
    white-space: nowrap !important;
}

.main-sidebar .brand-text {
    font-size: 16px !important;
    font-weight: 700 !important;
    overflow: visible !important;
    white-space: nowrap !important;
    display: inline !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    color: inherit !important;
}

/* =============================================================
   CONTENT AREA — remove accidental top whitespace
   ============================================================= */
.content-wrapper > .content-header {
    padding: 16px 24px 8px 24px !important;
}

.content-wrapper > .content {
    padding: 0 24px 32px 24px !important;
}

/* ── Prevent admin form labels from overflowing table cells ── */
#content-main label,
.change-form label,
fieldset label,
.form-row label {
    display: block !important;
    font-weight: 600 !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    margin-bottom: 5px !important;
    color: #9ca3af !important;
}

/* =============================================================
   CHANGELIST TABLE — readable, no overlap
   ============================================================= */
#result_list th,
#result_list td {
    padding: 10px 14px !important;
    vertical-align: middle !important;
}

/* =============================================================
   WRAPPER z-index guard — nothing should sit above the sidebar toggle
   ============================================================= */
.wrapper {
    position: relative !important;
    overflow-x: hidden !important;
}
</style>
{% endblock %}
