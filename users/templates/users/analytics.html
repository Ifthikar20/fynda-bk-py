<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Outfi · Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --border: #262b36;
      --text: #e6e8ee;
      --muted: #8a93a6;
      --accent: #ff5fa2;
      --good: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    header {
      padding: 20px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 12px; }
    main { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .tile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .tile .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .tile .value { font-size: 28px; font-weight: 600; margin-top: 6px; }
    .tile .sub { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    th { color: var(--muted); font-weight: 500; }
    .row { display: flex; gap: 20px; flex-wrap: wrap; }
    .row > .panel { flex: 1 1 320px; min-width: 0; }
    .err {
      background: #3a1820;
      border: 1px solid #6b2030;
      padding: 12px 16px;
      border-radius: 8px;
      color: #ffb3c1;
    }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { border-color: var(--accent); }
    canvas { max-height: 280px; }
  </style>
</head>
<body>
  <header>
    <h1>Outfi · Analytics</h1>
    <div>
      <span class="meta" id="generated">loading…</span>
      &nbsp;
      <button id="refresh">Refresh</button>
    </div>
  </header>

  <main>
    <div id="error" class="err" style="display:none"></div>

    <div class="grid" id="tiles"></div>

    <div class="panel">
      <h2>Daily signups (last 30 days)</h2>
      <canvas id="signupChart"></canvas>
    </div>

    <div class="row">
      <div class="panel">
        <h2>Signup source</h2>
        <table>
          <thead><tr><th>Provider</th><th style="text-align:right">Users</th></tr></thead>
          <tbody id="providerTable"></tbody>
        </table>
      </div>
      <div class="panel">
        <h2>Engagement</h2>
        <table>
          <thead><tr><th>Metric</th><th style="text-align:right">Count</th></tr></thead>
          <tbody id="engagementTable"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const DATA_URL = "/internal/analytics/data/";
    let chart = null;

    function fmt(n) {
      if (n === null || n === undefined) return "—";
      return n.toLocaleString();
    }

    function tile(label, value, sub) {
      return `<div class="tile">
        <div class="label">${label}</div>
        <div class="value">${fmt(value)}</div>
        ${sub ? `<div class="sub">${sub}</div>` : ""}
      </div>`;
    }

    async function load() {
      const err = document.getElementById("error");
      err.style.display = "none";
      try {
        const res = await fetch(DATA_URL, { credentials: "same-origin" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(data);
      } catch (e) {
        err.textContent = "Failed to load analytics: " + e.message +
          ". Make sure you're signed in as a staff user.";
        err.style.display = "block";
      }
    }

    function render(data) {
      const u = data.users || {};
      document.getElementById("generated").textContent =
        "updated " + new Date(data.generated_at).toLocaleString();

      document.getElementById("tiles").innerHTML = [
        tile("Total users", u.total),
        tile("Active", u.active),
        tile("Last 24h", u.signups_24h, "new signups"),
        tile("Last 7 days", u.signups_7d, "new signups"),
        tile("Last 30 days", u.signups_30d, "new signups"),
        tile("Staff", u.staff),
      ].join("");

      // provider table
      const provBody = document.getElementById("providerTable");
      provBody.innerHTML = (u.by_provider || []).map(p =>
        `<tr><td>${p.provider}</td><td style="text-align:right">${fmt(p.count)}</td></tr>`
      ).join("") || `<tr><td colspan="2" style="color:var(--muted)">No data</td></tr>`;

      // engagement table
      const eng = data.engagement || {};
      const engRows = Object.entries(eng).map(([k, v]) =>
        `<tr><td>${k.replace(/_/g, " ")}</td><td style="text-align:right">${fmt(v)}</td></tr>`
      ).join("");
      document.getElementById("engagementTable").innerHTML =
        engRows || `<tr><td colspan="2" style="color:var(--muted)">No data</td></tr>`;

      // chart
      const labels = data.daily_signups.map(d => d.date.slice(5));
      const values = data.daily_signups.map(d => d.count);
      const ctx = document.getElementById("signupChart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Signups",
            data: values,
            backgroundColor: "#ff5fa2",
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#8a93a6" }, grid: { color: "#1f232c" } },
            y: { ticks: { color: "#8a93a6", precision: 0 }, grid: { color: "#1f232c" }, beginAtZero: true },
          }
        }
      });
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
